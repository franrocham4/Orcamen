{% extends 'base.html' %}

{% block title %}Login - Controle de Pagamento{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh; background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);">
    <div class="card shadow-lg" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-cash-stack text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2 fw-bold">Controle de Pagamento</h2>
                <p class="text-muted">Faça login para continuar</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i>
                        Usuário ou senha incorretos.
                    </div>
                {% endif %}
                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">
                        <i class="bi bi-person"></i> Usuário
                    </label>
                    <input type="text" name="username" id="{{ form.username.id_for_label }}"
                           class="form-control form-control-lg" placeholder="Digite seu usuário" autofocus>
                </div>
                <div class="mb-4">
                    <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">
                        <i class="bi bi-lock"></i> Senha
                    </label>
                    <input type="password" name="password" id="{{ form.password.id_for_label }}"
                           class="form-control form-control-lg" placeholder="Digite sua senha">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
